<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="1200" height="850" font-family="'Arial','Helvetica',sans-serif">
  <defs>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1A2A3A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00C9FF"/>
      <stop offset="100%" stop-color="#92FE9D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="850" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" rx="16" ry="16" fill="url(#bgDark)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="8" rx="0" fill="url(#accentGrad)"/>

  <!-- Left decorative bar -->
  <rect x="60" y="60" width="4" height="730" rx="2" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Geometric background shapes -->
  <circle cx="1100" cy="150" r="180" fill="#00C9FF" opacity="0.04"/>
  <circle cx="100"  cy="700" r="220" fill="#92FE9D" opacity="0.03"/>
  <circle cx="600"  cy="425" r="300" fill="#ffffff" opacity="0.015"/>

  <!-- Top-right hex decoration -->
  <polygon points="1150,40 1190,62 1190,106 1150,128 1110,106 1110,62"
           fill="none" stroke="#00C9FF" stroke-width="1.5" opacity="0.4"/>
  <polygon points="1150,56 1178,72 1178,104 1150,120 1122,104 1122,72"
           fill="none" stroke="#92FE9D" stroke-width="1" opacity="0.3"/>

  <!-- Header -->
  <text x="100" y="110" font-family="Arial,sans-serif" font-size="11"
        fill="#00C9FF" letter-spacing="4" opacity="0.9">
    TEC EMPRENDE LAB  ·  CERTIFICADO OFICIAL
  </text>

  <!-- Accent line under header -->
  <line x1="100" y1="126" x2="700" y2="126" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Main title -->
  <text x="100" y="220" font-family="Arial,sans-serif" font-size="64"
        font-weight="900" fill="#FFFFFF" letter-spacing="-1" opacity="0.95">
    CERTIFICADO
  </text>
  <text x="100" y="262" font-family="Arial,sans-serif" font-size="20"
        fill="#00C9FF" letter-spacing="6" font-weight="300">
    DE PARTICIPACIÓN
  </text>

  <!-- Divider dot row -->
  <g fill="#00C9FF" opacity="0.5">
    <circle cx="100" cy="295" r="3"/>
    <circle cx="112" cy="295" r="2"/>
    <circle cx="122" cy="295" r="1.5"/>
  </g>

  <!-- Body intro -->
  <text x="100" y="352" font-family="Arial,sans-serif" font-size="16"
        fill="#7FA8C0" letter-spacing="1">
    Se certifica que
  </text>

  <!-- Recipient name -->
  <text id="recipient_name" x="100" y="430" font-family="Arial,sans-serif"
        font-size="52" font-weight="bold" fill="url(#nameGrad)" filter="url(#glow)">
    Nombre del Participante
  </text>

  <!-- Underline accent for name -->
  <rect x="100" y="444" width="680" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Description -->
  <text x="100" y="498" font-family="Arial,sans-serif" font-size="16" fill="#7FA8C0">
    ha completado satisfactoriamente el programa
  </text>
  <text x="100" y="530" font-family="Arial,sans-serif" font-size="24"
        font-weight="bold" fill="#FFFFFF" letter-spacing="1">
    TEC Emprende Lab
  </text>

  <!-- Stats row -->
  <g transform="translate(100,580)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#1E3248"/>
    <rect x="0" y="0" width="160" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>
    <text x="80" y="24" text-anchor="middle" font-size="10" fill="#7FA8C0" letter-spacing="1">PROGRAMA</text>
    <text x="80" y="44" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Emprendimiento</text>
    <!-- Box 2 -->
    <rect x="176" y="0" width="160" height="60" rx="8" fill="#1E3248"/>
    <rect x="176" y="0" width="160" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>
    <text x="256" y="24" text-anchor="middle" font-size="10" fill="#7FA8C0" letter-spacing="1">MODALIDAD</text>
    <text x="256" y="44" text-anchor="middle" font-size="13" font-weight="bold" fill="#FFFFFF">Presencial</text>
    <!-- Box 3 -->
    <rect x="352" y="0" width="160" height="60" rx="8" fill="#1E3248"/>
    <rect x="352" y="0" width="160" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>
    <text x="432" y="24" text-anchor="middle" font-size="10" fill="#7FA8C0" letter-spacing="1">FECHA</text>
    <!-- Date field -->
    <text id="issue_date" x="432" y="44" text-anchor="middle"
          font-size="13" font-weight="bold" fill="#FFFFFF">
      00/01/2026
    </text>
  </g>

  <!-- Bottom section -->
  <line x1="100" y1="690" x2="1100" y2="690" stroke="#1E3248" stroke-width="1.5"/>

  <!-- Signature blocks -->
  <g>
    <!-- Left sig -->
    <line x1="140" y1="760" x2="360" y2="760" stroke="#2A4A6A" stroke-width="1.5"/>
    <text x="250" y="778" text-anchor="middle" font-size="11" fill="#7FA8C0" letter-spacing="1">
      Director del Programa
    </text>
    <text x="250" y="794" text-anchor="middle" font-size="10" fill="#00C9FF">
      TEC Emprende Lab
    </text>
    <!-- Right sig -->
    <line x1="840" y1="760" x2="1060" y2="760" stroke="#2A4A6A" stroke-width="1.5"/>
    <text x="950" y="778" text-anchor="middle" font-size="11" fill="#7FA8C0" letter-spacing="1">
      Coordinador Académico
    </text>
    <text x="950" y="794" text-anchor="middle" font-size="10" fill="#00C9FF">
      TEC Emprende Lab
    </text>
  </g>

  <!-- Center badge -->
  <circle cx="600" cy="755" r="42" fill="#0D1B2A" stroke="#1E3248" stroke-width="2"/>
  <circle cx="600" cy="755" r="36" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.7"/>
  <text x="600" y="751" text-anchor="middle" font-size="11" font-weight="bold"
        fill="#00C9FF" letter-spacing="2">TEC</text>
  <text x="600" y="766" text-anchor="middle" font-size="9"
        fill="#7FA8C0" letter-spacing="1">EMPRENDE</text>

  <!-- Bottom accent -->
  <rect x="0" y="842" width="1200" height="8" rx="0" fill="url(#accentGrad)"/>

  <!-- Footer text -->
  <text x="600" y="831" text-anchor="middle" font-size="10" fill="#2A4A6A" letter-spacing="3">
    TECNOLÓGICO DE MONTERREY  ·  EMPRENDE LAB  ·  CERTIFICADO VERIFICADO
  </text>
</svg>
