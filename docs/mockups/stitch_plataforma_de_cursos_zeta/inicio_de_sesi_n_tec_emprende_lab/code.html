<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | TEC Emprende Lab</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FAF5EC;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary": "#5a601d",
                      "on-secondary-fixed": "#1f1b17",
                      "error-container": "#ffdad6",
                      "on-secondary-container": "#68615c",
                      "surface-container-low": "#f8f3ea",
                      "primary-fixed-dim": "#ffb59e",
                      "on-tertiary-fixed": "#1a1d00",
                      "secondary": "#645d58",
                      "on-tertiary-fixed-variant": "#444b07",
                      "on-primary-fixed-variant": "#842500",
                      "error": "#ba1a1a",
                      "secondary-fixed-dim": "#cec5be",
                      "on-tertiary-container": "#feffdb",
                      "on-surface-variant": "#5a4139",
                      "tertiary-container": "#727934",
                      "inverse-on-surface": "#f5f0e7",
                      "tertiary-fixed": "#e1e996",
                      "secondary-container": "#e7ded7",
                      "surface": "#fef9f0",
                      "surface-dim": "#ded9d1",
                      "on-tertiary": "#ffffff",
                      "on-primary-container": "#fffbff",
                      "surface-container": "#f2ede4",
                      "primary-fixed": "#ffdbd0",
                      "outline": "#8e7067",
                      "surface-container-high": "#ece8df",
                      "on-background": "#1d1c16",
                      "secondary-fixed": "#eae1da",
                      "surface-container-lowest": "#ffffff",
                      "on-primary-fixed": "#390b00",
                      "surface-variant": "#e7e2d9",
                      "on-secondary-fixed-variant": "#4b4641",
                      "primary": "#a93200",
                      "tertiary-fixed-dim": "#c5cc7d",
                      "primary-container": "#d24206",
                      "surface-tint": "#ad3300",
                      "on-surface": "#1d1c16",
                      "on-primary": "#ffffff",
                      "inverse-surface": "#32302b",
                      "surface-bright": "#fef9f0",
                      "outline-variant": "#e3bfb4",
                      "surface-container-highest": "#e7e2d9",
                      "on-error-container": "#93000a",
                      "on-secondary": "#ffffff",
                      "inverse-primary": "#ffb59e",
                      "on-error": "#ffffff",
                      "background": "#fef9f0"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "12px",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "xl": "20px",
                      "unit": "4px",
                      "gutter": "24px",
                      "lg": "16px",
                      "margin-desktop": "32px",
                      "margin-mobile": "12px",
                      "sm": "8px",
                      "sidebar-width": "220px",
                      "md": "12px"
              },
              "fontFamily": {
                      "display-lg": ["Poppins"],
                      "body-bold": ["Poppins"],
                      "body-base": ["Poppins"],
                      "label-caps": ["Poppins"],
                      "display-sm": ["Poppins"],
                      "display-md": ["Poppins"]
              },
              "fontSize": {
                      "display-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.3px", "fontWeight": "600"}],
                      "body-bold": ["14px", {"lineHeight": "22px", "fontWeight": "600"}],
                      "body-base": ["14px", {"lineHeight": "22px", "fontWeight": "400"}],
                      "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.6px", "fontWeight": "600"}],
                      "display-sm": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                      "display-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.2px", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-surface">
<main class="w-full max-w-[420px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-[0_2px_4px_rgba(26,22,18,0.04)] border border-outline-variant p-margin-desktop">
<!-- Branding Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-14 h-14 bg-primary rounded-lg flex items-center justify-center mb-4 shadow-sm">
<span class="text-on-primary font-bold text-3xl select-none">T</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-1">TEC Emprende Lab</h1>
<p class="font-body-base text-body-base text-on-secondary-container">Panel de gestión</p>
</div>
<!-- Form -->
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="email">
                        Correo electrónico
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-bright border border-outline-variant rounded-lg font-body-base text-on-surface placeholder:text-on-secondary-container/50 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="email" name="email" placeholder="tecemprendelab@itcr.ac.cr" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">
                            Contraseña
                        </label>
<a class="font-label-caps text-label-caps text-primary hover:underline decoration-2 underline-offset-4" href="#">¿Olvidó su clave?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-bright border border-outline-variant rounded-lg font-body-base text-on-surface placeholder:text-on-secondary-container/50 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-secondary-container hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary/40 bg-surface-bright" id="remember" name="remember" type="checkbox"/>
<label class="ml-2 block font-body-base text-body-base text-on-surface-variant" for="remember">
                        Recordar sesión
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-body-bold text-body-bold hover:bg-primary-container transition-all active:scale-[0.98] shadow-md hover:shadow-lg flex items-center justify-center space-x-2" type="submit">
<span>Ingresar</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Footer Info -->
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="font-label-caps text-label-caps text-on-secondary-container/70">
                    © 2024 Tecnológico de Costa Rica
                </p>
<div class="mt-2 flex justify-center space-x-4">
<a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-colors" href="#">Ayuda</a>
<span class="text-outline-variant">•</span>
<a class="font-label-caps text-label-caps text-on-secondary-container hover:text-primary transition-colors" href="#">Privacidad</a>
</div>
</div>
</div>
<!-- Atmospheric Micro-interaction for background -->
<div class="fixed -z-10 top-0 left-0 w-full h-full pointer-events-none opacity-30" id="ambient-glow">
<div class="absolute top-[10%] left-[15%] w-[300px] h-[300px] bg-primary/10 blur-[120px] rounded-full animate-pulse"></div>
<div class="absolute bottom-[10%] right-[15%] w-[400px] h-[400px] bg-tertiary/10 blur-[150px] rounded-full animate-pulse" style="animation-delay: 2s"></div>
</div>
</main>
<script>
        function togglePassword() {
            const passInput = document.getElementById('password');
            const passIcon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                passIcon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                passIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Success Feedback Animation
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span>`;
            btn.disabled = true;
            btn.classList.add('opacity-80');

            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span>Accediendo...</span>`;
                btn.classList.replace('bg-primary', 'bg-tertiary');
                
                setTimeout(() => {
                    // Simulating transition to dashboard
                    document.body.classList.add('opacity-0');
                    document.body.style.transition = 'opacity 0.5s ease';
                    console.log("Logged in successfully. Redirecting...");
                }, 800);
            }, 1200);
        });

        // Add subtle movement to the background glow based on mouse
        document.addEventListener('mousemove', (e) => {
            const glow = document.getElementById('ambient-glow');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            glow.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
        });
    </script>
</body></html>
