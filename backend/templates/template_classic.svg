<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="1200" height="850" font-family="Georgia, 'Times New Roman', serif">
  <!-- Background parchment -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDF6E3"/>
      <stop offset="100%" stop-color="#F5E6C8"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C9A227"/>
      <stop offset="50%"  stop-color="#F0C94A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Parchment background -->
  <rect width="1200" height="850" fill="url(#bgGrad)"/>

  <!-- Outer gold border -->
  <rect x="18" y="18" width="1164" height="814" rx="6" ry="6"
        fill="none" stroke="url(#borderGrad)" stroke-width="6"/>
  <!-- Inner gold border -->
  <rect x="30" y="30" width="1140" height="790" rx="4" ry="4"
        fill="none" stroke="url(#borderGrad)" stroke-width="2"/>
  <!-- Decorative inner frame -->
  <rect x="42" y="42" width="1116" height="766" rx="3" ry="3"
        fill="none" stroke="#C9A227" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Corner ornaments -->
  <g fill="#C9A227" opacity="0.85">
    <!-- Top-left -->
    <circle cx="55"   cy="55"  r="8"/>
    <circle cx="55"   cy="55"  r="4" fill="#FDF6E3"/>
    <line x1="63" y1="55" x2="110" y2="55" stroke="#C9A227" stroke-width="1.5"/>
    <line x1="55" y1="63" x2="55"  y2="110" stroke="#C9A227" stroke-width="1.5"/>
    <!-- Top-right -->
    <circle cx="1145" cy="55"  r="8"/>
    <circle cx="1145" cy="55"  r="4" fill="#FDF6E3"/>
    <line x1="1137" y1="55" x2="1090" y2="55" stroke="#C9A227" stroke-width="1.5"/>
    <line x1="1145" y1="63" x2="1145" y2="110" stroke="#C9A227" stroke-width="1.5"/>
    <!-- Bottom-left -->
    <circle cx="55"   cy="795" r="8"/>
    <circle cx="55"   cy="795" r="4" fill="#FDF6E3"/>
    <line x1="63" y1="795" x2="110" y2="795" stroke="#C9A227" stroke-width="1.5"/>
    <line x1="55" y1="787" x2="55"  y2="740" stroke="#C9A227" stroke-width="1.5"/>
    <!-- Bottom-right -->
    <circle cx="1145" cy="795" r="8"/>
    <circle cx="1145" cy="795" r="4" fill="#FDF6E3"/>
    <line x1="1137" y1="795" x2="1090" y2="795" stroke="#C9A227" stroke-width="1.5"/>
    <line x1="1145" y1="787" x2="1145" y2="740" stroke="#C9A227" stroke-width="1.5"/>
  </g>

  <!-- Header seal / emblem area -->
  <circle cx="600" cy="110" r="52" fill="#8B1A1A" filter="url(#shadow)"/>
  <circle cx="600" cy="110" r="44" fill="none" stroke="#C9A227" stroke-width="3"/>
  <text x="600" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="30"
        font-weight="bold" fill="#F0C94A">T</text>
  <text x="600" y="132" text-anchor="middle" font-size="7" fill="#F0C94A" letter-spacing="1.5">TEC EMPRENDE</text>

  <!-- Title -->
  <text x="600" y="210" text-anchor="middle" font-family="Georgia,serif"
        font-size="46" font-weight="bold" fill="#2C1810" letter-spacing="4">
    CERTIFICADO
  </text>
  <text x="600" y="248" text-anchor="middle" font-family="Georgia,serif"
        font-size="18" fill="#8B1A1A" letter-spacing="8">
    DE PARTICIPACIÓN
  </text>

  <!-- Decorative divider -->
  <line x1="200" y1="270" x2="1000" y2="270" stroke="#C9A227" stroke-width="1.5"/>
  <circle cx="600" cy="270" r="5" fill="#C9A227"/>
  <circle cx="200" cy="270" r="3" fill="#C9A227"/>
  <circle cx="1000" cy="270" r="3" fill="#C9A227"/>

  <!-- Body text -->
  <text x="600" y="330" text-anchor="middle" font-family="Georgia,serif"
        font-size="17" fill="#3C2415" letter-spacing="1">
    Se otorga el presente certificado a
  </text>

  <!-- Recipient name placeholder -->
  <text id="recipient_name" x="600" y="400" text-anchor="middle"
        font-family="Georgia,serif" font-size="48" font-weight="bold"
        fill="#8B1A1A" letter-spacing="2">
    Nombre del Participante
  </text>
  <line x1="180" y1="420" x2="1020" y2="420" stroke="#C9A227" stroke-width="1"/>

  <!-- Description -->
  <text x="600" y="470" text-anchor="middle" font-family="Georgia,serif"
        font-size="17" fill="#3C2415">
    por su destacada participación y satisfactoria conclusión del programa
  </text>
  <text x="600" y="500" text-anchor="middle" font-family="Georgia,serif"
        font-size="22" font-weight="bold" fill="#2C1810" letter-spacing="1">
    TEC Emprende Lab
  </text>

  <!-- Decorative divider 2 -->
  <line x1="300" y1="540" x2="900" y2="540" stroke="#C9A227" stroke-width="1"/>

  <!-- Date section -->
  <text x="600" y="585" text-anchor="middle" font-family="Georgia,serif"
        font-size="15" fill="#5C4030" letter-spacing="1">
    Expedido el día
  </text>
  <text id="issue_date" x="600" y="615" text-anchor="middle"
        font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#2C1810">
    00 de Enero de 2026
  </text>

  <!-- Signature lines -->
  <g transform="translate(0,0)">
    <!-- Left signature -->
    <line x1="180" y1="720" x2="450" y2="720" stroke="#2C1810" stroke-width="1.5"/>
    <text x="315" y="738" text-anchor="middle" font-size="12" fill="#3C2415" letter-spacing="1">
      Director del Programa
    </text>
    <text x="315" y="754" text-anchor="middle" font-size="11" fill="#8B1A1A">
      TEC Emprende Lab
    </text>
    <!-- Right signature -->
    <line x1="750" y1="720" x2="1020" y2="720" stroke="#2C1810" stroke-width="1.5"/>
    <text x="885" y="738" text-anchor="middle" font-size="12" fill="#3C2415" letter-spacing="1">
      Coordinador Académico
    </text>
    <text x="885" y="754" text-anchor="middle" font-size="11" fill="#8B1A1A">
      TEC Emprende Lab
    </text>
  </g>

  <!-- Bottom seal -->
  <circle cx="600" cy="730" r="38" fill="none" stroke="#C9A227" stroke-width="2" stroke-dasharray="4,3"/>
  <circle cx="600" cy="730" r="30" fill="none" stroke="#C9A227" stroke-width="1"/>
  <text x="600" y="726" text-anchor="middle" font-size="9" fill="#8B1A1A" letter-spacing="1" font-weight="bold">SELLO</text>
  <text x="600" y="738" text-anchor="middle" font-size="9" fill="#8B1A1A" letter-spacing="1" font-weight="bold">OFICIAL</text>

  <!-- Footer -->
  <text x="600" y="800" text-anchor="middle" font-size="11" fill="#8B6040" letter-spacing="2">
    TECNOLÓGICO DE MONTERREY · EMPRENDE LAB
  </text>
</svg>
